<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 다회차 급여 계산기</title>
    <style>
        body { font-family: sans-serif; margin: 20px; max-width: 800px; }
        h2 { margin-top: 30px; border-bottom: 2px solid #333; padding-bottom: 5px; }
        
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px 8px; text-align: center; vertical-align: middle; }
        th { background-color: #f4f4f4; font-weight: bold; }
        
        input[type="number"] { width: 60px; padding: 6px; text-align: right; border: 1px solid #ccc; border-radius: 4px; }
        input[type="number"]:focus { outline: none; border-color: #ff9800; }
        
        .btn-group { margin-bottom: 20px; }
        .btn-group button { padding: 10px 18px; margin-right: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-add { background-color: #4CAF50; color: white; }
        .btn-calc { background-color: #2196F3; color: white; }
        .btn-clear { background-color: #9e9e9e; color: white; }
        
        /* 첫 번째 열(행 번호와 삭제 버튼) UI 스타일링 */
        .row-num-cell { display: flex; align-items: center; justify-content: space-between; gap: 8px; border: none; padding: 10px; }
        .row-num { font-weight: bold; color: #555; width: 20px; }
        .delete-btn { 
            background-color: #ffebee; color: #d32f2f; border: none; border-radius: 4px; 
            width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: bold; padding: 0; transition: background-color 0.2s;
        }
        .delete-btn:hover { background-color: #ffcdd2; }
    </style>
</head>
<body>

    <h2>급여 기록</h2>
    <table id="feedTable">
        <thead>
            <tr>
                <th style="width: 80px;">Feed</th>
                <th>TASTE(g)</th>
                <th>CV(g)</th>
                <th>HYDRO(g)</th>
                <th>LEFT(g)</th>
            </tr>
        </thead>
        <tbody id="feedBody">
            <!-- 자바스크립트를 통해 행이 추가되는 영역 -->
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn-add" onclick="addRow()">+ 행 추가</button>
        <button class="btn-calc" onclick="calculate()">계산하기</button>
        <button class="btn-clear" onclick="clearAll()">전체 지우기</button>
    </div>

    <h2>영양소 Summary</h2>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Calories (kcal)</td><td id="res-kcal">0.00</td></tr>
            <tr><td>Water (ml)</td><td id="res-water">0.00</td></tr>
            <tr><td>Solid (g)</td><td id="res-solid">0.00</td></tr>
            <tr><td>Protein (g)</td><td id="res-protein">0.00</td></tr>
            <tr><td>Fat (g)</td><td id="res-fat">0.00</td></tr>
            <tr><td>Phosphorus (mg)</td><td id="res-phos">0.00</td></tr>
            <tr><td>Calcium (mg)</td><td id="res-calc">0.00</td></tr>
        </tbody>
    </table>

    <h2>사료별 섭취 총량</h2>
    <table>
        <thead>
            <tr>
                <th>Food Name</th>
                <th>Consumed Amount (g)</th>
            </tr>
        </thead>
        <tbody id="consumedFoodBody">
            <!-- 섭취한 사료 데이터가 여기에 추가됨 -->
            <tr><td colspan="2" style="color: #888;">계산 버튼을 누르면 내역이 표시됩니다.</td></tr>
        </tbody>
    </table>

    <script>
        // 사료별 1g당 영양소 (임의의 예시 데이터)
        const nutritionData = {
            "TASTE": { kcal: 1.2, water: 0.7, solid: 0.3, protein: 0.12, fat: 0.05, phos: 1.5, calc: 1.2 },
            "CV": { kcal: 0.9, water: 0.8, solid: 0.2, protein: 0.08, fat: 0.03, phos: 1.1, calc: 1.0 },
            "HYDRO": { kcal: 1.1, water: 0.75, solid: 0.25, protein: 0.10, fat: 0.04, phos: 1.3, calc: 1.1 }
        };

        // 초기 화면 설정 (첫 번째 행 자동 추가)
        window.onload = function() {
            addRow();
        };

        // 행 추가 기능
        function addRow() {
            const tbody = document.getElementById("feedBody");
            const tr = document.createElement("tr");
            
            tr.innerHTML = `
                <td>
                    <div class="row-num-cell">
                        <button class="delete-btn" onclick="deleteRow(this)" title="삭제">&times;</button>
                        <span class="row-num"></span>
                    </div>
                </td>
                <td><input type="number" class="taste" min="0"></td>
                <td><input type="number" class="cv" min="0"></td>
                <td><input type="number" class="hydro" min="0"></td>
                <td><input type="number" class="left" min="0"></td>
            `;
            tbody.appendChild(tr);
            updateRowNumbers();
        }

        // 행 삭제 기능
        function deleteRow(button) {
            const row = button.closest("tr");
            row.remove();
            updateRowNumbers();
            calculate(); // 행 삭제 후 자동으로 다시 계산
        }

        // 행 번호 업데이트 기능
        function updateRowNumbers() {
            const rows = document.querySelectorAll("#feedBody tr");
            rows.forEach((row, index) => {
                row.querySelector(".row-num").innerText = index + 1;
            });
        }

        // 전체 지우기 (Clear) 기능
        function clearAll() {
            const inputs = document.querySelectorAll("#feedBody input[type='number']");
            inputs.forEach(input => {
                input.value = "";
            });
            calculate(); // 초기화 후 결과 0으로 갱신
        }

        // 총합 계산 기능
        function calculate() {
            let total = { kcal: 0, water: 0, solid: 0, protein: 0, fat: 0, phos: 0, calc: 0 };
            
            // 각 사료별 최종 섭취량을 저장할 객체
            let totalConsumedFoods = { "TASTE": 0, "CV": 0, "HYDRO": 0 };
            
            const rows = document.querySelectorAll("#feedBody tr");
            let hasAnyInput = false;

            // 각 행(다회차 급여)별로 순회하면서 계산
            rows.forEach(row => {
                const taste = parseFloat(row.querySelector(".taste").value) || 0;
                const cv = parseFloat(row.querySelector(".cv").value) || 0;
                const hydro = parseFloat(row.querySelector(".hydro").value) || 0;
                const left = parseFloat(row.querySelector(".left").value) || 0;

                const totalGiven = taste + cv + hydro;

                // 급여량이 있을 때만 계산
                if (totalGiven > 0) {
                    hasAnyInput = true;
                    let ratio = 1; // 기본적으로 남김 없이 다 먹었다고 가정
                    
                    if (left >= totalGiven) {
                        ratio = 0; // 준 것보다 많이 남기거나 다 남긴 경우
                    } else if (left > 0) {
                        ratio = (totalGiven - left) / totalGiven; // 남긴 양만큼 비례해서 섭취 비율 계산
                    }

                    // 영양소와 사료 섭취량을 더해주는 내부 함수
                    const addNutrition = (foodKey, amount) => {
                        if (amount > 0) {
                            const nut = nutritionData[foodKey];
                            const actualAmount = amount * ratio; // 실제 섭취한 무게
                            
                            // 사료별 섭취량 누적
                            totalConsumedFoods[foodKey] += actualAmount;
                            
                            // 영양소 누적
                            total.kcal += actualAmount * nut.kcal;
                            total.water += actualAmount * nut.water;
                            total.solid += actualAmount * nut.solid;
                            total.protein += actualAmount * nut.protein;
                            total.fat += actualAmount * nut.fat;
                            total.phos += actualAmount * nut.phos;
                            total.calc += actualAmount * nut.calc;
                        }
                    };

                    addNutrition("TASTE", taste);
                    addNutrition("CV", cv);
                    addNutrition("HYDRO", hydro);
                }
            });

            // 계산 결과를 Summary 테이블에 반영 (소수점 둘째 자리까지)
            document.getElementById("res-kcal").innerText = total.kcal.toFixed(2);
            document.getElementById("res-water").innerText = total.water.toFixed(2);
            document.getElementById("res-solid").innerText = total.solid.toFixed(2);
            document.getElementById("res-protein").innerText = total.protein.toFixed(2);
            document.getElementById("res-fat").innerText = total.fat.toFixed(2);
            document.getElementById("res-phos").innerText = total.phos.toFixed(2);
            document.getElementById("res-calc").innerText = total.calc.toFixed(2);

            // 섭취한 사료 총량 테이블 업데이트
            const consumedBody = document.getElementById("consumedFoodBody");
            consumedBody.innerHTML = ""; // 기존 내용 초기화

            if (!hasAnyInput) {
                consumedBody.innerHTML = `<tr><td colspan="2" style="color: #888;">계산 버튼을 누르면 내역이 표시됩니다.</td></tr>`;
            } else {
                for (const [foodName, amount] of Object.entries(totalConsumedFoods)) {
                    // 0g 초과로 먹은 사료만 표에 나타나도록 설정
                    if (amount > 0) {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `<td><strong>${foodName}</strong></td><td>${amount.toFixed(2)}</td>`;
                        consumedBody.appendChild(tr);
                    }
                }
            }
        }
    </script>
</body>
</html>
